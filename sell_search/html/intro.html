<!DOCTYPE html>
<html lang="ko">

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta charset="utf-8" />
  <title>Deal Listing - PivotBridge</title>
  <link rel="stylesheet" href="../css/globals.css" />
  <link rel="stylesheet" href="../css/intro.css" />
</head>

<body>
  <main class="frame">
    <!-- Header / Navigation -->
    <header class="div">
      <img class="element" src="/img/common/logo.png" alt="PivotBridge Logo" />
      <nav class="div-2" aria-label="주요 메뉴">
        <ul class="div-3" role="list">
          <li class="m-a-wrapper"><span class="text-wrapper">M&A탐색</span></li>
          <li class="div-wrapper"><span class="text-wrapper">M&A등록</span></li>
          <li class="div-wrapper"><span class="text-wrapper">매칭알림</span></li>
          <li class="div-wrapper"><span class="text-wrapper">매각가 추정</span></li>
          <li class="div-wrapper"><span class="text-wrapper">데이터룸</span></li>
          <li class="div-wrapper"><span class="text-wrapper">마이페이지</span></li>
        </ul>
        <div class="img"></div>
        <div class="div-4">
          <div class="div-wrapper-2"><span class="text-wrapper-2">제휴기관</span></div>
          <div class="div-5">
            <img class="element-2" src="/img/common/company.png" alt="Company icon" />
            <span class="text-wrapper-3">Company</span>
          </div>
          <img class="union" src="/img/common/login.png" alt="User profile" />
        </div>
      </nav>
    </header>
    <!-- Deal Type Selection Cards -->
    <section class="div-6" aria-label="거래 유형 선택">
      <!-- 경영권 이전거래 -->
      <article class="frame-wrapper">
        <div class="div-7">
          <div class="div-wrapper-3">
            <span class="text-wrapper-4">경영권 이전거래</span>
          </div>
          <div class="div-8">
            <img class="union-2" src="/img/intro/ic_go_register.png" alt="기업매각 아이콘" />
            <span class="text-wrapper-5">기업매각</span>
          </div>
        </div>
      </article>
      <!-- 특정자산 이전거래 -->
      <article class="frame-wrapper-2">
        <div class="div-9">
          <div class="div-wrapper-3">
            <span class="text-wrapper-6">특정자산 이전거래</span>
          </div>
          <div class="div-10">
            <img class="union-3" src="/img/intro/ic_go_asset.png" alt="자산매각 아이콘" />
            <span class="text-wrapper-7">자산매각</span>
          </div>
        </div>
      </article>
    </section>
    <!-- Disclaimer -->
    <p class="p">거래당사자에 한합니다. 비자격대리인의 등록시 즉시 삭제됩니다.</p>
    <!-- Hero / Deal Listing Info -->
    <section class="div-11" aria-label="Deal Listing 안내">
      <div class="card-3d">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
      </div>

      <h1 class="upload-your-m-a-deal">Deal Explorer</h1>
      <div class="div-wrapper-4">
        <p class="text-wrapper-8">아래를 선택하시면 탐색화면으로 이동합니다.</p>
      </div>
    </section>
  </main>
</body>

</html>
