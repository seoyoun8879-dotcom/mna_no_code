<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta charset="utf-8" />
  <link rel="stylesheet" href="../css/globals.css" />
  <link rel="stylesheet" href="../css/intro.css" />
</head>

<body>
  <div class="frame">
    <div class="group">
      <div class="rectangle"></div>
      <div class="text-wrapper">이 페이지 하루 보지않기</div>
    </div>
    <div class="go-teaser-btn">
      <img src="/img/register/ic_go_example.png" class="group-2">
      <div class="text-wrapper-2">Teaser Memo</div>
    </div>
    <div class="group-3">
      <div class="auto-flex">
        <div class="group-4">
          <div class="group-wrapper">
            <div class="div-wrapper">
              <div class="expression-of-wrapper">
                <p class="expression-of">
                  거래의향서(Expression of Interest, EOI)를 제출<br />하실 수 있습니다. EOI는 상대측 협상의향을
                  확인하는 것으로<br />아무런 법적, 계약적 구속력이 없습니다.
                </p>
              </div>
            </div>
          </div>
          <div class="gateway-to-the-m-a-wrapper">
            <div class="gateway-to-the-m-a">티져(Teaser) 보기</div>
          </div>
        </div>

        <div class="loader-wrap">
          <div class="loader">
            <span><span></span><span></span><span></span><span></span></span>
            <div class="base">
              <span></span>
              <div class="face"></div>
            </div>
          </div>

          <div class="longfazers">
            <span></span><span></span><span></span><span></span>
          </div>
        </div>
        <img class="img" src="/img/eoi/main_img.png" />

      </div>
      <div class="group-5">
        <div class="gateway-to-the-m-a-2">매도측 회신기한은 10일(권장)입니다.</div>
        <div class="group-6">
          <p class="p">문자통지가 이루어지며, 담당 컨설턴트가 <br />지정됩니다.</p>
          <div class="gateway-to-the-m-a-3">Accept</div>
        </div>
        <div class="group-7">
          <div class="gateway-to-the-m-a-4">Decline</div>
          <p class="text-wrapper-3">
            거절 혹은 회신기한 경과시 문자통지가 이루어 <br />집니다. 거절사유가 기재될 수 있습니다.
          </p>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
